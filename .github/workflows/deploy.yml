name: Deploy to GitHub Pages

on:
    schedule:
        - cron: '0 22 * * *'
    workflow_dispatch:
        inputs:
            topic:
                description: '主题'
                required: false
                type: string

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Generate report
              env:
                  AI_API_KEY: ${{ secrets.AI_API_KEY }}
              run: |
                  if [[ -n "${{ github.event.inputs.topic }}" ]]; then
                    npx tsx scripts/generate.ts --topic "${{ github.event.inputs.topic }}"
                  else
                    npx tsx scripts/generate.ts
                  fi

            - name: Build static site
              env:
                  NEXT_PUBLIC_BASE_PATH: /NextDaily
              run: npm run build

            - name: Deploy to gh-pages
              env:
                  TOPIC: ${{ github.event.inputs.topic }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # 备份 content 和 out
                  cp -r content /tmp/content-bak
                  cp -r out /tmp/out-bak

                  # 清理 master 的 content/out/，避免切分支冲突
                  rm -rf content out

                  # 切到 gh-pages（首次创建，后续增量）
                  if git fetch origin gh-pages 2>/dev/null; then
                    git checkout gh-pages 2>/dev/null || git checkout -b gh-pages origin/gh-pages
                  else
                    git checkout --orphan gh-pages
                    git rm -rf --quiet . 2>/dev/null || true
                  fi

                  # 确保 .gitignore 存在
                  cat > .gitignore << 'GITIGNORE'
node_modules/
.env
.env.*
.next/
.DS_Store
GITIGNORE

                  # 替换 content
                  rm -rf content
                  mkdir -p content
                  cp -r /tmp/content-bak/* content/ 2>/dev/null || true
                  rm -rf /tmp/content-bak

                  # 展开 out 到根目录（覆盖旧的）
                  cp -r /tmp/out-bak/* .
                  rm -rf /tmp/out-bak

                  # .nojekyll
                  touch .nojekyll

                  # 增量提交
                  git add .gitignore .nojekyll content/
                  git add index.html 404.html _next/ report/ *.txt *.xml *.json *.ico *.svg 2>/dev/null || true

                  DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
                  if [[ -n "$TOPIC" ]]; then
                    MSG="${DATE} ${TOPIC}"
                  else
                    MSG="${DATE} 每日信息差"
                  fi

                  if git diff --cached --quiet; then
                    echo "无变更，跳过提交"
                  else
                    git commit -m "$MSG"
                    git push origin gh-pages
                  fi
