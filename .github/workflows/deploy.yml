name: Deploy to GitHub Pages

# 触发条件：定时（每天北京时间 6:00）+ 手动触发
on:
    schedule:
        - cron: '0 22 * * *'
    workflow_dispatch:
        inputs:
            topic:
                description: '搜索主题（留空为 A 股消息）'
                required: false
                type: string

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            # ===== 构建阶段 =====

            - name: 检出代码
              uses: actions/checkout@v4

            - name: 安装 Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: 安装依赖
              run: npm ci

            - name: 生成报告
              env:
                  AI_API_KEY: ${{ secrets.AI_API_KEY }}
              run: |
                  if [[ -n "${{ github.event.inputs.topic }}" ]]; then
                    npx tsx scripts/generate.ts --topic "${{ github.event.inputs.topic }}"
                  else
                    npx tsx scripts/generate.ts
                  fi

            - name: 构建静态站点
              env:
                  NEXT_PUBLIC_BASE_PATH: /NextDaily
              run: npm run build

            # ===== 部署阶段 =====

            - name: 部署到 gh-pages（增量提交）
              env:
                  TOPIC: ${{ github.event.inputs.topic }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # 1. 备份 content、out、.gitignore
                  cp -r content /tmp/content-bak
                  cp -r out /tmp/out-bak
                  cp .gitignore /tmp/gitignore-bak 2>/dev/null || true

                  # 2. 清理 master 工作区，避免切分支冲突
                  rm -rf content out

                  # 3. 切到 gh-pages（首次创建，后续增量）
                  if git fetch origin gh-pages 2>/dev/null; then
                    git checkout gh-pages 2>/dev/null || git checkout -b gh-pages origin/gh-pages
                  else
                    git checkout --orphan gh-pages
                    git rm -rf --quiet . 2>/dev/null || true
                  fi

                  # 4. 替换 content（保留历史 .md 文件增量）
                  rm -rf content
                  mkdir -p content
                  cp -r /tmp/content-bak/* content/ 2>/dev/null || true
                  rm -rf /tmp/content-bak

                  # 5. 展开 out/ 到根目录（index.html 等直接放根目录）
                  cp -r /tmp/out-bak/* .
                  rm -rf /tmp/out-bak

                  # 6. 恢复 .gitignore（从 master 拷过来的）
                  cp /tmp/gitignore-bak .gitignore 2>/dev/null || true
                  rm -f /tmp/gitignore-bak

                  # 7. 禁止 Jekyll 编译
                  touch .nojekyll

                  # 8. 添加所有文件（.gitignore 已恢复，node_modules 等自动排除）
                  git add --all

                  # 9. 生成提交信息（日期 + 主题）
                  DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
                  if [[ -n "$TOPIC" ]]; then
                    MSG="${DATE} ${TOPIC}"
                  else
                    MSG="${DATE} 每日信息差"
                  fi

                  # 10. 增量提交（无变更则跳过）
                  if git diff --cached --quiet; then
                    echo "无变更，跳过提交"
                  else
                    git commit -m "$MSG"
                    git push origin gh-pages
                  fi
