name: Deploy to GitHub Pages

on:
    schedule:
        - cron: '0 22 * * *'
    workflow_dispatch:
        inputs:
            topic:
                description: '主题'
                required: false
                type: string
    push:
        branches: [master]

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Determine if generation is needed
              id: check
              run: |
                  if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    echo "generate=true" >> $GITHUB_OUTPUT
                  else
                    NON_MD_COUNT=$(git diff --name-only HEAD~1 HEAD | grep -v '^content/' | grep -v '^$' | wc -l)
                    if [[ "$NON_MD_COUNT" -gt 0 ]]; then
                      echo "generate=true" >> $GITHUB_OUTPUT
                    else
                      echo "generate=false" >> $GITHUB_OUTPUT
                    fi
                  fi

            - name: Generate report
              if: steps.check.outputs.generate == 'true'
              env:
                  AI_API_KEY: ${{ secrets.AI_API_KEY }}
              run: |
                  if [[ -n "${{ github.event.inputs.topic }}" ]]; then
                    npx tsx scripts/generate.ts --topic "${{ github.event.inputs.topic }}"
                  else
                    npx tsx scripts/generate.ts
                  fi

            - name: Build static site
              env:
                  NEXT_PUBLIC_BASE_PATH: /NextDaily
              run: npm run build

            - name: Deploy to gh-pages (incremental)
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # 备份构建产物
                  cp -r out /tmp/out-backup

                  # 拉取 gh-pages，不存在则创建
                  if git fetch origin gh-pages 2>/dev/null; then
                    git checkout gh-pages 2>/dev/null || git checkout -b gh-pages origin/gh-pages
                  else
                    git checkout --orphan gh-pages
                    git rm -rf --quiet . 2>/dev/null || true
                    git commit --allow-empty -m "init"
                  fi

                  # 清理旧内容，写入新构建产物
                  git rm -rf --quiet . 2>/dev/null || true
                  cp -r /tmp/out-backup/* .
                  rm -rf /tmp/out-backup

                  # 增量提交
                  git add .
                  TOPIC="${{ github.event.inputs.topic }}"
                  DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
                  if [[ -n "$TOPIC" ]]; then
                    MSG="${DATE} ${TOPIC}"
                  else
                    MSG="${DATE} 每日信息差"
                  fi
                  git commit -m "$MSG" || echo "无变更，跳过提交"

                  git push origin gh-pages
