name: Deploy to GitHub Pages

on:
    schedule:
        - cron: '0 22 * * *'
    workflow_dispatch:
        inputs:
            topic:
                description: '主题'
                required: false
                type: string
    push:
        branches: [master]

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Generate report
              env:
                  AI_API_KEY: ${{ secrets.AI_API_KEY }}
              run: |
                  if [[ -n "${{ github.event.inputs.topic }}" ]]; then
                    npx tsx scripts/generate.ts --topic "${{ github.event.inputs.topic }}"
                  else
                    npx tsx scripts/generate.ts
                  fi

            - name: Build static site
              env:
                  NEXT_PUBLIC_BASE_PATH: /NextDaily
              run: npm run build

            - name: Deploy to gh-pages
              env:
                  TOPIC: ${{ github.event.inputs.topic }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # 备份 content 和 out
                  mkdir -p /tmp/nextdaily-deploy
                  cp -r content /tmp/nextdaily-deploy/ 2>/dev/null || true
                  cp -r out /tmp/nextdaily-deploy/ 2>/dev/null || true

                  # 切换到 gh-pages，不存在则创建
                  if git fetch origin gh-pages 2>/dev/null; then
                    git checkout gh-pages 2>/dev/null || git checkout -b gh-pages origin/gh-pages
                  else
                    git checkout --orphan gh-pages
                    git rm -rf --quiet . 2>/dev/null || true
                    git commit --allow-empty -m "init"
                  fi

                  # 清空旧内容（只删 git 追踪的文件，不动 node_modules / .env 等）
                  git ls-files -z | xargs -0 rm -f 2>/dev/null || true

                  # 拷回 content 和 out
                  mkdir -p content out
                  cp -r /tmp/nextdaily-deploy/content/* content/ 2>/dev/null || true
                  cp -r /tmp/nextdaily-deploy/out/* . 2>/dev/null || true
                  rm -rf /tmp/nextdaily-deploy

                  # 增量提交
                  git add content/ ./*.html ./*.txt _next/ report/ 2>/dev/null || true
                  git add .

                  DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
                  if [[ -n "$TOPIC" ]]; then
                    MSG="${DATE} ${TOPIC}"
                  else
                    MSG="${DATE} 每日信息差"
                  fi

                  if git diff --cached --quiet; then
                    echo "无变更，跳过提交"
                  else
                    git commit -m "$MSG"
                    git push origin gh-pages
                  fi
